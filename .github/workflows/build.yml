name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Run linters
      run: |
        go fmt ./...
        go vet ./...
    
    - name: Build binary
      run: go build -ldflags="-s -w" -o gvm-ssh ./main.go
    
    - name: Test CLI
      run: |
        ./gvm-ssh --help
        ./gvm-ssh setup --help

  build-and-push-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build-and-push-image]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    
    - name: Build release binaries
      run: |
        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gvm-ssh-linux-amd64 ./main.go
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o gvm-ssh-linux-arm64 ./main.go
        GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o gvm-ssh-darwin-amd64 ./main.go
        GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o gvm-ssh-darwin-arm64 ./main.go
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o gvm-ssh-windows-amd64.exe ./main.go
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## GVM SSH Setup Tool ${{ github.ref_name }}
          
          ### Changes
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          
          ### Installation
          
          #### Docker (Recommended)
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```
          
          #### Binary Download
          Download the appropriate binary for your platform from the assets below.
          
          ### Usage
          ```bash
          # Interactive setup
          gvm-ssh wizard
          
          # Non-interactive setup
          gvm-ssh setup --account myaccount --git-alias myaccount-git
          ```
        draft: false
        prerelease: false
    
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./gvm-ssh-linux-amd64
        asset_name: gvm-ssh-linux-amd64
        asset_content_type: application/octet-stream